name: Deploy site

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!docs/CONTRIBUTING.md"
      - "!docs/CUSTOMIZE.md"
      - "!docs/FAQ.md"
      - "!docs/INSTALL.md"
      - "!README.md"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!docs/CONTRIBUTING.md"
      - "!docs/CUSTOMIZE.md"
      - "!docs/FAQ.md"
      - "!docs/INSTALL.md"
      - "!README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4.2.2 # Đã nâng cấp lên v4.2.2 để hỗ trợ Node.js 24

      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1.222.0 # Đã cập nhật bản mới nhất để tương thích tối đa
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Setup Python 🐍
        uses: actions/setup-python@v5.4.0 # Đã nâng cấp lên v5.4.0 để hỗ trợ Node.js 24
        with:
          python-version: "3.13"
          cache: "pip" # caching pip dependencies

      - name: Setup Node 🧰
        uses: actions/setup-node@v4.2.0 # Đã nâng cấp lên v4.2.0 để hỗ trợ Node.js 24
        with:
          node-version: "20" # Bạn vẫn có thể giữ nguyên bản Node.js 20 cho dự án của mình ở đây
          cache: "npm"

      - name: Install JS deps 📦
        run: npm ci

      - name: Update _config.yml ⚙️
        uses: fjogeleit/yaml-update-action@v0.15.0 # Nên ghim cụ thể phiên bản thay vì dùng tag @main để tránh rủi ro bảo mật
        with:
          commitChange: false
          valueFile: "_config.yml"
          propertyPath: "giscus.repo"
          value: ${{ github.repository }}

      - name: Install and Build 🔧
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade nbconvert
          export JEKYLL_ENV=production
          bundle exec jekyll build

      - name: Purge unused CSS 🧹
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js

      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.7.3 # Đã cập nhật lên v4.7.3 mới nhất chạy mượt hơn
        with:
          folder: _site
